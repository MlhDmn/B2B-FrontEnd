<main class="auth-shell">
   <section class="auth-panel" aria-labelledby="signup-title">
      <div class="brand-block">
         <a routerLink="/login" class="brand-mark" aria-label="B2B catalog home">B2B</a>
         <div>
            <p class="eyebrow">Supplier portal</p>
            <h1 id="signup-title">Create account</h1>
         </div>
      </div>

      <form (ngSubmit)="submit(signupForm)" #signupForm="ngForm" novalidate class="auth-form">
         <div class="form-grid">
            <div class="field-group">
               <label for="firstName">First name</label>
               <input type="text" id="firstName" name="firstName" [(ngModel)]="form.firstName" required maxlength="50" />
            </div>

            <div class="field-group">
               <label for="lastName">Last name</label>
               <input type="text" id="lastName" name="lastName" [(ngModel)]="form.lastName" required maxlength="50" />
            </div>
         </div>

         <div class="field-group">
            <label for="email">Email</label>
            <input
               type="email"
               id="email"
               name="email"
               [(ngModel)]="form.email"
               (focus)="clearError()"
               (ngModelChange)="clearError()"
               placeholder="john@example.com"
               required
               maxlength="100" />
         </div>

         <div class="field-group">
            <label for="password">Password</label>
            <input
               type="password"
               id="password"
               name="password"
               [(ngModel)]="form.password"
               (focus)="clearError()"
               (ngModelChange)="clearError()"
               placeholder="At least 8 characters"
               required
               minlength="8"
               maxlength="100" />
         </div>

         <div class="field-group">
            <label for="confirm-password">Confirm password</label>
            <input
               type="password"
               id="confirm-password"
               name="confirmPassword"
               [(ngModel)]="form.confirmPassword"
               (focus)="clearError()"
               (ngModelChange)="clearError()"
               placeholder="Repeat your password"
               required
               minlength="8"
               maxlength="100" />
         </div>

         <label class="check-row terms-row">
            <input id="tmc" name="tmc" type="checkbox" required />
            <span>I accept the <a href="#">Terms and Conditions</a></span>
         </label>

         @if (errorMessage()) {
            <p role="alert" class="form-error">{{ errorMessage() }}</p>
         }

         <button type="submit" [disabled]="isSubmitting()" class="primary-button">
            {{ isSubmitting() ? 'Creating account...' : 'Create account' }}
         </button>
      </form>

      <p class="auth-switch">
         Already have an account?
         <a routerLink="/login">Sign in</a>
      </p>
   </section>

   <aside class="auth-aside" aria-hidden="true">
      <div class="metric-stack">
         <div>
            <span>Verified vendors</span>
            <strong>420</strong>
         </div>
         <div>
            <span>Catalog depth</span>
            <strong>8K</strong>
         </div>
         <div>
            <span>Regions</span>
            <strong>TR</strong>
         </div>
      </div>
   </aside>
</main>
