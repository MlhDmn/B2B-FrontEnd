<main class="bg-gray-50 min-h-screen py-10 px-4 md:px-8 dark:bg-neutral-900 flex flex-col items-center justify-center">
   <div class="w-full max-w-md mx-auto">
      <!-- Logo -->
      <a href="/" class="mb-10 block">
         <img src="https://readymadeui.com/logo-alt.svg" alt="logo" class="w-14 min-h-14 mx-auto block" />
      </a>

      <!-- Login Card -->
      <div class="p-6 rounded-lg bg-white border border-slate-300 shadow-xs md:p-8 dark:bg-neutral-800 dark:border-neutral-700">
         <h1 class="text-slate-900 text-center text-3xl font-bold dark:text-slate-50">Sign in</h1>
         
         <form (ngSubmit)="submit(loginForm)" #loginForm="ngForm" novalidate class="space-y-6 mt-10">
            <div>
               <label for="email" class="mb-2 text-slate-900 font-medium text-sm inline-block dark:text-slate-50">Email</label>
               <input type="email" id="email" name="email" [(ngModel)]="form.email" (focus)="clearError()" (ngModelChange)="clearError()" placeholder="john@example.com" required
                  class="px-3 py-2.5 text-sm text-slate-900 rounded-md bg-white w-full outline-1 -outline-offset-1 outline-slate-300 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 dark:text-slate-50 dark:bg-neutral-700 dark:outline-neutral-600" />
            </div>
            <div>
               <label for="password" class="mb-2 text-slate-900 font-medium text-sm inline-block dark:text-slate-50">Password</label>
               <input type="password" id="password" name="password" [(ngModel)]="form.password" (focus)="clearError()" (ngModelChange)="clearError()" placeholder="••••••••" required
                  class="px-3 py-2.5 text-sm text-slate-900 rounded-md bg-white w-full outline-1 -outline-offset-1 outline-slate-300 focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 dark:text-slate-50 dark:bg-neutral-700 dark:outline-neutral-600" />
            </div>

            <div class="flex items-start flex-wrap gap-2">
               <label class="flex items-center group has-[input:checked]:text-slate-900">
                  <input id="remember" name="remember" type="checkbox" class="sr-only" />
                  <!-- Custom box -->
                  <span class="flex h-4 w-4 shrink-0 items-center justify-center rounded outline-1 outline-slate-300 dark:outline-neutral-600
                              bg-white dark:bg-neutral-700
                              group-has-[input:checked]:bg-blue-600
                              group-has-[input:checked]:outline-blue-600
                              group-focus-within:outline-2
                              group-focus-within:outline-blue-600" aria-hidden="true">
                     <!-- Checkmark -->
                     <svg class="size-3 text-white opacity-0 group-has-[input:checked]:opacity-100"
                        viewBox="0 0 12 10" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 5l3 3 7-7" />
                     </svg>
                  </span>
                  <span class="ml-3 text-sm text-slate-700 dark:text-slate-300">
                     Remember me
                  </span>
               </label>

               <a href="#"
                  class="ml-auto text-sm font-medium text-blue-700 dark:text-blue-500 hover:underline focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded">
                  Forgot password?
               </a>
            </div>

            @if (errorMessage()) {
               <p role="alert" class="text-sm text-red-600 dark:text-red-400">{{ errorMessage() }}</p>
            }

            <button type="submit" [disabled]="isSubmitting()"
               class="w-full py-2 px-3.5 text-sm rounded-md font-semibold cursor-pointer tracking-wide text-white border border-blue-600 bg-blue-600 hover:bg-blue-700 transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
               {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}</button>
               
            <div class="text-slate-900 text-sm text-center dark:text-slate-50 mt-6">
               Don't have an account? 
               <a routerLink="/signup" class="text-blue-700 hover:underline ml-1 font-medium dark:text-blue-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500 rounded">
                  Sign up
               </a>
            </div>
         </form>
      </div>
   </div>
</main>
