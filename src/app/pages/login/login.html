<main class="auth-shell">
   <section class="auth-panel" aria-labelledby="login-title">
      <div class="brand-block">
         <a routerLink="/login" class="brand-mark" aria-label="B2B catalog home">B2B</a>
         <div>
            <p class="eyebrow">Supplier portal</p>
            <h1 id="login-title">Sign in</h1>
         </div>
      </div>

      <form (ngSubmit)="submit(loginForm)" #loginForm="ngForm" novalidate class="auth-form">
         <div class="field-group">
            <label for="email">Email</label>
            <input
               type="email"
               id="email"
               name="email"
               [(ngModel)]="form.email"
               (focus)="clearError()"
               (ngModelChange)="clearError()"
               placeholder="john@example.com"
               required />
         </div>

         <div class="field-group">
            <label for="password">Password</label>
            <input
               type="password"
               id="password"
               name="password"
               [(ngModel)]="form.password"
               (focus)="clearError()"
               (ngModelChange)="clearError()"
               placeholder="Enter your password"
               required />
         </div>

         <div class="form-row">
            <label class="check-row">
               <input id="remember" name="remember" type="checkbox" />
               <span>Remember me</span>
            </label>

            <a href="#" class="text-link">Forgot password?</a>
         </div>

         @if (errorMessage()) {
            <p role="alert" class="form-error">{{ errorMessage() }}</p>
         }

         <button type="submit" [disabled]="isSubmitting()" class="primary-button">
            {{ isSubmitting() ? 'Signing in...' : 'Sign in' }}
         </button>
      </form>

      <p class="auth-switch">
         Don't have an account?
         <a routerLink="/signup">Create one</a>
      </p>
   </section>

   <aside class="auth-aside" aria-hidden="true">
      <div class="metric-stack">
         <div>
            <span>Active SKUs</span>
            <strong>1,284</strong>
         </div>
         <div>
            <span>Fulfillment</span>
            <strong>98.2%</strong>
         </div>
         <div>
            <span>Markets</span>
            <strong>12</strong>
         </div>
      </div>
   </aside>
</main>
