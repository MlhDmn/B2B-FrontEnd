<main class="cart-shell">
  <header class="cart-header">
    <div class="header-inner">
      <div class="brand-row">
        <a routerLink="/home" class="brand-mark" aria-label="B2B catalog home">B2B</a>
        <div>
          <p class="eyebrow">Checkout workspace</p>
          <h1>Shopping Cart</h1>
        </div>
      </div>

      <div class="header-actions">
        <a routerLink="/cart" class="cart-nav-button" aria-current="page">Shopping Cart</a>
        <a routerLink="/home" class="secondary-button">Back to products</a>
      </div>
    </div>
  </header>

  <section class="cart-body">
    <section class="cart-panel" aria-labelledby="cart-title">
      <p class="eyebrow">Cart</p>
      <h2 id="cart-title">Your shopping cart</h2>
      <p>Your cart is empty right now. Products added to the cart will show up here.</p>
      <a routerLink="/home" class="primary-button">Browse products</a>
    </section>
  </section>
</main>
